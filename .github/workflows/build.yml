name: Build EMB3531 Image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout SDK
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghcActions
          sudo docker image prune --all --force
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu \
            gcc-arm-none-eabi \
            bc bison flex libelf-dev libssl-dev \
            python3 python3-pyelftools python3-setuptools \
            qemu-user-static \
            debootstrap \
            parted \
            dosfstools \
            e2fsprogs \
            pv \
            wget \
            gdisk \
            kmod \
            xz-utils \
            locales \
            libc-bin \
            util-linux \
            procps

      - name: Enable binfmt for arm64
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Build all
        run: |
          sudo EMB_CI=1 ./sdk.sh all -j 8

      - name: Verify outputs
        run: |
          echo "=== Build Artifacts ==="
          ls -lh workspace/output/images/
          ls -lh workspace/output/emb3531.img
          echo "=== Image partition layout ==="
          sudo parted workspace/output/emb3531.img print || true
          echo "=== rootfs check ==="
          mkdir -p workspace/tmp/verify-rootfs
          sudo mount -o loop,ro workspace/output/images/rootfs.img workspace/tmp/verify-rootfs
          echo "Hostname: $(cat workspace/tmp/verify-rootfs/etc/hostname)"
          echo "Kernel modules:"
          ls workspace/tmp/verify-rootfs/lib/modules/
          echo "Installed packages (head):"
          sudo chroot workspace/tmp/verify-rootfs dpkg -l | head -30
          sudo umount workspace/tmp/verify-rootfs
          rmdir workspace/tmp/verify-rootfs

      - name: Compress emb3531.img
        run: |
          xz -9e -T0 workspace/output/emb3531.img
          ls -lh workspace/output/emb3531.img.xz

      - name: Create release if not exists
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload emb3531.img.xz to GitHub Release
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            workspace/output/emb3531.img.xz \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}